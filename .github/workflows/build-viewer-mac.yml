name: Build viewer for macOS

on:
  push:
    paths:
      - 'viewer.py'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests opencv-python pillow numpy

      - name: Build viewer
        run: pyinstaller --onefile --windowed --name viewer viewer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-macos
          path: dist/viewer
